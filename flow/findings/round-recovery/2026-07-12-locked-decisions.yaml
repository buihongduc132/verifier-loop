- id: LD8
  turn: OT5
  parts: ["G5-1", "G4-1", "G4-2", "shape-1 vs secrets-persist comparison"]
  user_quote: "Self resolve it yourself by delegate sub agents to find the LEAST resistance approach THEN ensure to clearly note that into the decision"
  decision: >
    Round recovery uses SHAPE-1 (wait-only, never kill the signer, no fresh-spawn in
    RECOVER). RECOVER polls live orphan processes for verdict.json; if a null slot has
    no live signer (dead orphan, or child never finished), RECOVER falls through to the
    user-visible guidance: "run RESUME N+1 for fresh slots and fresh keys." NO
    per-slot signing secret is persisted to disk; the per-verifier secret lives only in
    the original child process env. LD1 shape-2 (kill orphan → resume-by-SID → nudge) is
    SUPERSEDED by this decision because it is unimplementable without secret persistence
    (see LD8 evidence). LD2 (truncated-session wrinkle accepted) is MOOT because
    resume-by-SID is not used in shape-1.
  status: locked
  auto_decided: true
  supersedes: [LD1]
  tradeoff: |
    Sub-agent path-a-resistance scored shape-1: IMPLEMENTATION 2/10, PRODUCT 6/10,
    THREAT-MODEL 1/10, FAILURE-MODE 2/10. path-b-resistance scored secrets-persist:
    IMPLEMENTATION 4/10 (gating cost: landed verifier-identity SHALL NOT must change),
    PRODUCT 7/10 (forced full kill-safety suite ~125-165 LOC), SECURITY 5/10 (widens
    forging from "write+env-read" to "store-read during open window" + requires 3-section
    THREAT-MODEL.md rewrite + spec scenario rewrite). secrets-persist's only marginal
    capability over shape-1 is salvaging a slot whose orphan already died; the cost is
    ~4-8x the code, a spec change, and a threat-model regression. The least-resistance
    path that preserves all fail-closed invariants is shape-1. Cost is honest: dead-but
    null slots must advance to RESUME N+1 (fresh slots, fresh keys), which is the
    product's existing fail-closed recovery path.

